<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a8eff"/>
      <stop offset="100%" stop-color="#0f69cf"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff8a1f"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Clipboard body -->
  <rect x="96" y="128" width="320" height="328" rx="32" fill="white"/>

  <!-- Clipboard clip (top mount) -->
  <rect x="178" y="94" width="156" height="72" rx="20" fill="#0a4fa8"/>
  <rect x="204" y="108" width="104" height="48" rx="13" fill="#1683ff"/>
  <circle cx="256" cy="132" r="16" fill="rgba(255,255,255,0.25)"/>

  <!-- Row 1: checkmark + line -->
  <polyline points="132,222 155,249 196,205" fill="none" stroke="#1683ff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="220" y="218" width="152" height="14" rx="7" fill="#dbe8f7"/>

  <!-- Row 2: checkmark + line -->
  <polyline points="132,302 155,329 196,285" fill="none" stroke="#12a150" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="220" y="298" width="152" height="14" rx="7" fill="#dbe8f7"/>

  <!-- Row 3: checkmark + line (partial) -->
  <polyline points="132,382 155,409 196,365" fill="none" stroke="#1683ff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="220" y="378" width="108" height="14" rx="7" fill="#dbe8f7"/>

  <!-- Pencil (orange, rotated, overlapping bottom-right) -->
  <g transform="translate(378,370) rotate(-35)">
    <rect x="-24" y="-96" width="48" height="108" rx="10" fill="url(#pencil)"/>
    <polygon points="-24,12 24,12 0,56" fill="#ffd08a"/>
    <line x1="0" y1="12" x2="0" y2="56" stroke="rgba(0,0,0,0.1)" stroke-width="2"/>
    <rect x="-24" y="-108" width="48" height="18" rx="6" fill="#cccccc"/>
    <rect x="-24" y="-36" width="48" height="4" rx="2" fill="rgba(0,0,0,0.10)"/>
  </g>
</svg>
